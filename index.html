<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#20B2AA">
  <title>Suleiman Play Store :: Tech Empire ::</title>

  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/suleiman-logo.png" type="image/png" />
</head>
<body data-theme="light">

  <header class="site-header">
    <div class="brand">
      <img src="icons/suleiman-logo.png" alt="Suleiman Play Store" class="logo">
      <div class="brand-text">
        <h1>Suleiman Play Store</h1>
        <p class="tag">All apps by Suleiman Alhassan — one place.</p>
      </div>
    </div>

    <input id="search" placeholder="Search apps (e.g. Dhikr, Tech...)" autocomplete="off" />
    
    <div id="theme-switcher">
      <select id="theme-select">
        <option value="light">☀️ Light</option>
        <option value="dark">🌙 Dark</option>
        <option value="green">🕌 Islamic Green</option>
      </select>
    </div>
  </header>

  <main class="main-content">
    
    <div class="category-wrapper">
      <h2 class="category-title">🕌 Islamic Apps</h2>
      <div id="islamic-container" class="apps-container"></div>
    </div>

    <div class="category-wrapper">
      <h2 class="category-title">💻 Tech & Cyber Security</h2>
      <div id="tech-container" class="apps-container"></div>
    </div>

    <div class="category-wrapper">
      <h2 class="category-title">🎮 Games</h2>
      <div id="games-container" class="apps-container"></div>
    </div>

    <div class="category-wrapper">
      <h2 class="category-title">💎 Premium Apps</h2>
      <div id="premium-container" class="apps-container"></div>
    </div>

  </main>

  <footer>
    <p>© 2026 Suleiman Alhassan — Never Hide Tech Empire</p>
  </footer>

  <script src="js/main.js"></script>
  <script>
    // Theme Management
    const themeSelect = document.getElementById('theme-select');
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.body.setAttribute('data-theme', savedTheme);
    themeSelect.value = savedTheme;

    themeSelect.addEventListener('change', (e) => {
      const newTheme = e.target.value;
      document.body.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    });
  </script>
</body>
</html>
